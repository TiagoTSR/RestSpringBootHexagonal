spring.application.name=RestSpringBootHaxagonal

spring.datasource.url=${DB_URL1}
spring.datasource.username=${DB_USER1}
spring.datasource.password=${DB_PASSWORD1}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.sslmode=disable

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.level.org.hibernate.event.internal=DEBUG
logging.level.org.hibernate.id=TRACE
logging.level.org.hibernate.engine.internal=DEBUG


